name: Bug report
description: Something in a plugin, skill, agent, or hook doesn't work as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Please do not use this form for security issues — see the [security policy](../../security/policy).
  - type: dropdown
    id: plugin
    attributes:
      label: Which plugin?
      options:
        - agentic-engineering
        - readme-keeper
        - marketplace / install
        - not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: Running /ship on an approved pitch, the executor ... but expected ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. /plugin install ...
        2. /pitch "..."
        3. ...
  - type: input
    id: env
    attributes:
      label: Environment
      description: Claude Code surface + version (CLI / desktop / IDE), OS.
      placeholder: Claude Code CLI 1.x, macOS 15
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste any error output. It will be rendered as code.
      render: shell
