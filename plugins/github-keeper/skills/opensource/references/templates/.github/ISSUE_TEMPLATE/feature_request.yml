name: Feature request
description: Propose a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What's missing or awkward today? Describe the problem before the solution.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What would you add or change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
